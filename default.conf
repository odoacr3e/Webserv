#tutorial:	https://man.openbsd.org/OpenBSD-5.6/nginx.conf.5
events{
}
http
{
	server
	{
		server_name www.server.it;
		listen 10.11.4.5:9020;
		listen 127.0.0.1:9021;
		root /www/var/;
		client_max_body_size 2048;
		methods GET;
		storage www/storage/;
		error_page 404 /errors/non_esisto;
		error_page 418 /errors/tea.html;
		location /code/backend/
		{
			alias /srcs/;
			#return 401;
			autoindex on;
			methods GET;
		}
		location /code/frontend/
		{
			alias /www/var/;
			#return 401;
			autoindex on;
			methods GET;
		}
		location /code/
		{
			alias /www/symlinks/code/;
			#return 401;
			autoindex on;
			methods GET;
		}
		location /docs/
		{
			alias /notes/documentation/;
			autoindex on;
			methods GET;
		}
		location /script/
		{
			alias /www/cgi-bin/;
			methods GET;
			autoindex on;
		}
		location /script/giorgio/
		{
			alias /www/cgi-bin/giorgio/;
			index giorgio.html;
			methods GET;
			script on;
			script_type giorgio;
		}
		location /script/pokedex/
		{
			alias /www/cgi-bin/pokedex/;
			index index.html;
			methods GET;
			script on;
			script_type pokedex;
		}
		location /script/weaksleep/
		{
			alias /www/cgi-bin/weaksleep/;
			cgi_path /usr/bin/python3;
			index index.html;
			methods GET POST;
			script on;
			script_type weaksleep;
		}
		location /script/cub3D/
		{
			alias /www/cgi-bin/cub3D/;
			cgi_path www/cgi-bin/cub3D/cub3D.cgi;
			index index.html;
			methods GET;
			script on;
			script_type cub3D;
			fastcgi on;
		}
		location /script/crypter/
		{
			alias /www/cgi-bin/crypter/;
			cgi_path www/cgi-bin/crypter/crypter;
			index index.html;
			methods GET POST;
			script on;
			script_type crypter;
		}
		location /
		{
			root /www/var/;
			methods ALL;
			index index.html;
			error_page 404 /errors/403.html;
			error_page 418 /errors/non_esisto;
		}
		location /login/
		{
			alias /www/var/;
			return 200 /;
			methods GET;
			cookie on;
		}
		location /storage/login/
		{
			alias /www/storage/;
			return 200 /;
			methods GET;
			cookie on;
		}
		location /upload/login/
		{
			alias /www/var/upload/;
			return 200 /;
			methods GET;
			cookie on;
		}
		location /script/login/
		{
			alias /www/cgi-bin/;
			return 200 /;
			methods GET;
			cookie on;
		}
		location /code/login/
		{
			alias /www/symlinks/code/;
			return 200 /;
			methods GET;
			cookie on;
		}
		location /script/crypter/login/
		{
			alias /www/cgi-bin/crypter/;
			return 200 /script/crypter/;
			methods GET;
			cookie on;
		}
		location /upload/
		{
			alias /www/var/upload/;
			methods GET POST;
			storage www/storage/;
			index index.html;
			client_max_body_size 1000000000;
		}
		location /storage/
		{
			alias /www/storage/;
			autoindex on;
			methods ALL;
		}
	}
	server
	{
	 	listen 127.0.0.1:9007;
	 	listen 127.0.0.1:9006;
	}
}
