#SECTION input
#NO SERVER BLOCK
http
{
		location /srcs/
		{
			alias /www/var/;
			autoindex on;
		}
		server_name www.gabibbo.it;
		listen 127.0.0.1:9020;
		root /www/var/;
		client_max_body_size 8000;
		error_page 404 /errors/gabibbo.html;
		location / 
		{
			root /www/var/;
			autoindex on;
		}
}

