<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>cub3D HUD</title>

<style>
body {
    margin: 0;
    background: #0b0f12;
    font-family: monospace;
    color: #c7d5e0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.game-wrapper {
    display: grid;
    grid-template-columns: 120px auto 120px;
    grid-template-rows: auto 80px;
    gap: 20px;
    align-items: center;
}

.screen-container {
    grid-column: 2;
    grid-row: 1;
    padding: 10px;
    background: linear-gradient(145deg, #1a2228, #0d1318);
    border: 4px solid #2a3942;
    box-shadow: 0 0 25px #000;
}

#screen {
    display: block;
    width: 640px;
    height: 480px;
    image-rendering: pixelated;
}

.controls-left,
.controls-right {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.controls-bottom {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    background: #1a2228;
    border: 2px solid #2a3942;
    color: #c7d5e0;
    padding: 10px 12px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.1s;
}

button:hover {
    background: #2a3942;
    box-shadow: 0 0 8px #00ffcc;
}

button:active {
    transform: scale(0.95);
}

.label {
    font-size: 12px;
    text-align: center;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="game-wrapper">

    <!-- LEFT -->
    <div class="controls-left">
        <button onclick="sendInput('restart')">X<br><span class="label">Restart</span></button>
    </div>

    <!-- CENTER SCREEN -->
    <div class="screen-container">
        <!-- Aggiornato per leggere BMP statico -->
        <img id="screen" src="/static/render.bmp">
    </div>

    <!-- RIGHT -->
    <div class="controls-right">
        <button onclick="sendInput('w')">W</button>
        <button onclick="sendInput('a')">A</button>
        <button onclick="sendInput('d')">D</button>
        <button onclick="sendInput('s')">S</button>
    </div>

    <!-- BOTTOM (MINIGAME) -->
    <div class="controls-bottom">
        <button onclick="sendInput('1')">1<br><span class="label">Sasso</span></button>
        <button onclick="sendInput('2')">2<br><span class="label">Carta</span></button>
        <button onclick="sendInput('3')">3<br><span class="label">Forbici</span></button>
        <button onclick="sendInput('4')">4<br><span class="label">Cerchio</span></button>
    </div>

</div>

<script>
const screenImg = document.getElementById("screen");
const cgiPath = "cub3D.cgi";

let isWaiting = false;
let inputQueue = []; // Qui mettiamo i tasti premuti

async function updateFrame() {
    if (isWaiting) return;
    isWaiting = true;

    // Se la coda è vota, mandamo er carattere di "idle" (%), 
    // sennò piamo er primo comando utile (shift)
    const action = inputQueue.length > 0 ? inputQueue.shift() : "%";
    const ts = Date.now();

    try {
        const response = await fetch(`${cgiPath}?${action}&t=${ts}`);
         
        if (response.ok) {
            const blob = await response.blob();
            const objectURL = URL.createObjectURL(blob);
            
            screenImg.onload = () => {
                URL.revokeObjectURL(objectURL);
                isWaiting = false;
                // Chiamamo er prossimo frame subito dopo che questo è apparso
                requestAnimationFrame(updateFrame);	
            };
            
            screenImg.src = objectURL;
        } else {
            isWaiting = false;
            setTimeout(updateFrame, 1000); 
        }
    } catch (e) {
        isWaiting = false;
        setTimeout(updateFrame, 100);
    }
}

// Questa mo' aggiunge er comando alla lista invece de sovrascrive
function sendInput(action) {
    inputQueue.push(action);
    // Se er loop s'era addormito, lo svejamo
    if (!isWaiting) updateFrame();
}

// Bonus: aggiungemo pure i tasti della tastiera, così giochi come un pro
window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (['w', 'a', 's', 'd', 'x', '1', '2', '3', '4'].includes(key)) {
        sendInput(key);
    } else if (key === 'enter') {
        sendInput(' ');
    }
});

updateFrame();
</script>

</body>
</html>
