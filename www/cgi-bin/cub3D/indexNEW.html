<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>cub3D HUD • Capitano Edition</title>

<style>
    body { 
        margin: 0; 
        background: #0b0f12; 
        font-family: 'Courier New', monospace; 
        color: #c7d5e0; 
        display: flex; 
        flex-direction: column;
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        overflow: hidden;
    }
    
    .game-wrapper { 
        display: grid; 
        grid-template-columns: 120px auto 120px; 
        grid-template-rows: auto 80px; 
        gap: 20px; 
        align-items: center; 
    }
    
    .screen-container { 
        grid-column: 2; 
        grid-row: 1; 
        padding: 10px; 
        background: linear-gradient(145deg, #1a2228, #0d1318); 
        border: 4px solid #2a3942; 
        box-shadow: 0 0 25px #000; 
    }
    
    #screen { 
        display: block; 
        width: 640px; 
        height: 480px; 
        image-rendering: pixelated; 
        background: #000; 
    }
    
    .controls-left, .controls-right { display: flex; flex-direction: column; gap: 12px; }
    .controls-bottom { grid-column: 2; grid-row: 2; display: flex; justify-content: center; gap: 20px; }
    
    button { 
        background: #1a2228; 
        border: 2px solid #2a3942; 
        color: #c7d5e0; 
        padding: 10px 12px; 
        cursor: pointer; 
        font-size: 14px; 
        transition: 0.1s; 
    }
    button:hover { background: #2a3942; box-shadow: 0 0 8px #00ffcc; }
    button:active { transform: scale(0.95); }
    
    .label { font-size: 10px; text-align: center; opacity: 0.6; display: block; }

    /* Pannello Log - Stile Terminale */
    #log-panel {
        width: 640px;
        height: 100px;
        background: #050709;
        border: 2px solid #2a3942;
        margin-top: 20px;
        padding: 8px;
        font-size: 11px;
        overflow-y: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: inset 0 0 10px #000;
    }
    .log-entry { margin-bottom: 2px; }
    .log-time { color: #566c7a; margin-right: 8px; }
    .log-msg-err { color: #ff4d4d; }
    .log-msg-ok { color: #00ffcc; }
    .log-msg-info { color: #8899a6; }
</style>
</head>

<body>

<div class="game-wrapper">
    <div class="controls-left">
        <button onclick="sendInput('x')">X<br><span class="label">Restart</span></button>
    </div>

    <div class="screen-container">
        <img id="screen" src="" alt="In attesa de segna'...">
    </div>

<div class="controls-right">
    <button onmousedown="sendInput('W')" onmouseup="sendInput('w')">W</button>
    <button onmousedown="sendInput('A')" onmouseup="sendInput('a')">A</button>
    <button onmousedown="sendInput('D')" onmouseup="sendInput('d')">D</button>
    <button onmousedown="sendInput('S')" onmouseup="sendInput('s')">S</button>
    <button onmousedown="sendInput('E')" onmouseup="sendInput('e')">E (interact)</button>
</div>

    <div class="controls-bottom">
        <button onclick="sendInput('1')">1<br><span class="label">Sasso</span></button>
        <button onclick="sendInput('2')">2<br><span class="label">Carta</span></button>
        <button onclick="sendInput('3')">3<br><span class="label">Forbici</span></button>
        <button onclick="sendInput('4')">4<br><span class="label">Cerchio</span></button>
    </div>
</div>

<div id="log-panel">
    <div style="color: #4da6ff; border-bottom: 1px solid #2a3942; margin-bottom: 4px; padding-bottom: 2px;">[ HUD SYSTEM TERMINAL ]</div>
    <div id="log-content"></div>
</div>

<script>
const screenImg = document.getElementById("screen");
const logContent = document.getElementById("log-content");
const cgiPath = "cub3D.cgi";

let isWaiting = false;
const FPS = 30;
const frameDelay = 1000 / FPS;
let lastFrameTime = 0;

// Mappa degli stati attivi (true = premuto)
const activeKeys = {
    'W': false, 'A': false, 'S': false, 'D': false,
    'J': false, 'L': false, 'E': false, 'X': false
};

const keyMap = {
    'w': 'W', 'a': 'A', 's': 'S', 'd': 'D',
    'j': 'J', 'l': 'L', 'e': 'E', 'x': 'X'
};

// Listener tastiera puliti
window.addEventListener('keydown', (e) => {
    const k = keyMap[e.key.toLowerCase()];
    if (k) { e.preventDefault(); activeKeys[k] = true; }
});

window.addEventListener('keyup', (e) => {
    const k = keyMap[e.key.toLowerCase()];
    if (k) { e.preventDefault(); activeKeys[k] = false; }
});

// Funzione helper per i bottoni HTML
function sendInput(char) {
    // Se è maiuscola, attiva il tasto, se minuscola disattiva
    const upper = char.toUpperCase();
    activeKeys[upper] = (char === upper);
}

function addLog(msg, type = 'info') {
    const now = new Date();
    const timeStr = now.toLocaleTimeString();
    const colorClass = type === 'err' ? 'log-msg-err' : (type === 'ok' ? 'log-msg-ok' : 'log-msg-info');
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="log-time">[${timeStr}]</span><span class="${colorClass}">${msg}</span>`;
    logContent.appendChild(div);
    if (logContent.childNodes.length > 5) logContent.removeChild(logContent.firstChild);
}

function loadImage(url) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(url);
        img.onerror = () => reject(new Error("Errore BMP"));
        img.src = url;
    });
}

async function updateLoop() {
    const now = performance.now();
    
    if (!isWaiting && (now - lastFrameTime >= frameDelay)) {
        isWaiting = true;

        // COSTRUZIONE STRINGA INPUT: Mandiamo MAIUSCOLA se premuto, minuscola se rilasciato
        let actions = "";
        for (let key in activeKeys) {
            actions += activeKeys[key] ? key : key.toLowerCase();
        }

        const ts = Date.now();
        const targetBytes = 14745654;

        try {
            // Inviamo TUTTI gli stati (es: ?WaSdjLx&t=...)
            const response = await fetch(`${cgiPath}?${actions}&t=${ts}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const reader = response.body.getReader();
            let chunks = [];
            let receivedLength = 0;

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                chunks.push(value);
                receivedLength += value.length;
                if (receivedLength >= targetBytes) break;
            }

            let allChunks = new Uint8Array(receivedLength);
            let pos = 0;
            for(let chunk of chunks) {
                allChunks.set(chunk, pos);
                pos += chunk.length;
            }

            const objectURL = URL.createObjectURL(new Blob([allChunks], {type: 'image/bmp'}));
            await loadImage(objectURL);
            
            const oldUrl = screenImg.src;
            screenImg.src = objectURL;
            if (oldUrl.startsWith('blob:')) URL.revokeObjectURL(oldUrl);

            lastFrameTime = performance.now();
            isWaiting = false;

        } catch (e) {
            addLog(`ERRORE: ${e.message}`, 'err');
            setTimeout(() => { isWaiting = false; }, 1000);
        }
    }
    requestAnimationFrame(updateLoop);
}

addLog("Sistema Pronto.", "ok");
updateLoop();
</script>
</body>
</html>
