<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url={URL}">
    <title>Redirecting... {CODE}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* CSS minimo per non mostrare una pagina bianca flashata male */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .loader-container { text-align: center; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <p>Reindirizzamento in corso (Errore {CODE})...</p>
        <p><small>Se non vieni reindirizzato, <a href="{URL}">clicca qui</a>.</small></p>
    </div>

    <div style="display:none">
        <span>{TITLE}</span>
        <span>{MSG}</span>
        <span>{MSG_TYPE}</span>
        <span>{DETAIL}</span>
    </div>

    <script>
        (function() {
            // Logica di redirect immediato via Script
            var targetUrl = "{URL}";
            
            // Se per qualche motivo {URL} fosse vuoto, torna alla home
            if (!targetUrl || targetUrl === "" || targetUrl.indexOf("{URL}") !== -1) {
                targetUrl = "/";
            }

            // Esecuzione immediata
            window.location.href = targetUrl;
        })();
    </script>
</body>
</html>
